<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Matchbox — 試合動画を素早く検索・絞り込みできるアプリ">
  <title>Matchbox</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    /* ── Design Tokens ─────────────────────────────── */
    :root {
      --bg: #0d0d14;
      --surface: #16161e;
      --surface-2: #1c1c27;
      --glass: rgba(22, 22, 30, 0.88);
      --border: rgba(255, 255, 255, 0.07);
      --border-hi: rgba(255, 255, 255, 0.16);
      --text: #f0f0f8;
      --sub: rgba(240, 240, 248, 0.52);
      --muted: rgba(240, 240, 248, 0.28);
      --accent: #4f8aff;
      --accent-dim: rgba(79, 138, 255, 0.14);
      --year: #9b74ff;
      --year-dim: rgba(155, 116, 255, 0.14);
      --success: #30d158;
      --warn: #ffd60a;
      --danger: #ff453a;
      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 24px;
      --r-xl: 30px;
      --fab: 56px;
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── Reset ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% -5%, rgba(79, 138, 255, 0.11) 0%, transparent 65%),
        radial-gradient(ellipse 50% 35% at 85% 105%, rgba(155, 116, 255, 0.09) 0%, transparent 65%);
    }

    /* ── Root Layout ───────────────────────────────── */
    #root {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: env(safe-area-inset-top);
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      height: 56px;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-bottom: 1px solid var(--border);
    }

    .h-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .h-title {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(130deg, #fff 0%, rgba(255, 255, 255, .65) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #count-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    /* view toggle */
    .vtog {
      display: flex;
      gap: 2px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
    }

    .vtog-btn {
      background: none;
      border: none;
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 15px;
      transition: all .2s var(--ease-out);
      -webkit-tap-highlight-color: transparent;
    }

    .vtog-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(79, 138, 255, .4);
    }

    .vtog-btn:active {
      transform: scale(0.93);
    }

    /* ── Sync Status ───────────────────────────────── */
    #sync-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 18px;
      font-size: 11px;
      color: var(--muted);
    }

    .sdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--success);
      transition: background .3s;
    }

    .sdot.spin {
      background: var(--warn);
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .25
      }
    }

    /* ── Active Filter Bar ─────────────────────────── */
    #af-bar {
      display: flex;
      gap: 6px;
      padding: 6px 16px 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    #af-bar:empty {
      display: none;
    }

    #af-bar::-webkit-scrollbar {
      display: none;
    }

    .af-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      background: var(--accent-dim);
      border: 1px solid rgba(79, 138, 255, .3);
      border-radius: 20px;
      padding: 5px 10px 5px 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
      font-family: inherit;
    }

    .af-chip:active {
      transform: scale(0.94);
    }

    .af-chip.y {
      background: var(--year-dim);
      border-color: rgba(155, 116, 255, .3);
      color: var(--year);
    }

    .af-chip.s {
      background: rgba(255, 214, 10, .1);
      border-color: rgba(255, 214, 10, .3);
      color: #c9a800;
    }

    #af-clearall {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      background: rgba(255, 69, 58, .1);
      border: 1px solid rgba(255, 69, 58, .25);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--danger);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
      font-family: inherit;
    }

    #af-clearall:active {
      transform: scale(0.94);
    }

    /* ── Content Area ──────────────────────────────── */
    #content-area {
      flex: 1;
      padding: 8px 14px calc(var(--fab) + 36px + env(safe-area-inset-bottom));
    }

    /* ── Month Separator ───────────────────────────── */
    .m-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0 6px;
    }

    .m-sep-t {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .m-sep-l {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .m-sep-tile {
      grid-column: 1 / -1;
    }

    /* ── List Cards ────────────────────────────────── */
    #list-wrap {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .card-shell {
      display: block;
      text-decoration: none;
      color: inherit;
      border-radius: var(--r-md);
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
    }

    .card-shell:active {
      transform: scale(0.97);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .c-date {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .4px;
    }

    .badge {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: .3px;
    }

    .b0 {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .b1 {
      background: rgba(48, 209, 88, .13);
      color: #30d158;
    }

    .b2 {
      background: rgba(255, 159, 10, .13);
      color: #ff9f0a;
    }

    .b3 {
      background: rgba(255, 69, 58, .13);
      color: var(--danger);
    }

    .b4 {
      background: var(--year-dim);
      color: var(--year);
    }

    .c-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
    }

    .c-opp {
      font-size: 13px;
      color: var(--sub);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .vs-tag {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .5px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 4px;
    }

    mark {
      background: rgba(255, 214, 10, .28);
      border-radius: 2px;
      color: inherit;
      padding: 0 1px;
    }

    /* ── Tile Cards ────────────────────────────────── */
    #tile-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .tile-shell {
      display: block;
      text-decoration: none;
      color: inherit;
      aspect-ratio: 1;
      border-radius: var(--r-md);
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
    }

    .tile-shell:active {
      transform: scale(0.97);
    }

    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      gap: 7px;
      position: relative;
      overflow: hidden;
    }

    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 110%, var(--accent-dim) 0%, transparent 72%);
      opacity: 0;
      transition: opacity .25s;
    }

    .tile-shell:active .tile::after {
      opacity: 1;
    }

    .tile-opp {
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
    }

    .tile-date {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── Empty State ───────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 20px;
      gap: 14px;
    }

    .empty-icon {
      font-size: 44px;
      opacity: .35;
    }

    .empty-txt {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    /* ── Skeleton Loader ───────────────────────────── */
    #loader {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skel {
      background: var(--surface);
      border-radius: var(--r-md);
      height: 110px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .skel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, .04) 50%, transparent 100%);
      animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%)
      }

      100% {
        transform: translateX(100%)
      }
    }

    /* ── Error Box ─────────────────────────────────── */
    #err-box {
      display: none;
      margin: 12px 14px;
      background: rgba(255, 69, 58, .1);
      border: 1px solid rgba(255, 69, 58, .28);
      border-radius: var(--r-md);
      padding: 14px;
    }

    #err-box.on {
      display: block;
    }

    .err-t {
      font-size: 13px;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 4px;
    }

    .err-b {
      font-size: 12px;
      color: var(--sub);
    }

    /* ── FAB ───────────────────────────────────────── */
    #fab {
      position: fixed;
      bottom: calc(22px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      width: var(--fab);
      height: var(--fab);
      border-radius: 50%;
      background: linear-gradient(135deg, #4f8aff 0%, #7c5cfc 100%);
      box-shadow: 0 4px 22px rgba(79, 138, 255, .55);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      transition: transform .22s var(--ease-spring), box-shadow .2s, background .25s;
    }

    #fab:active {
      transform: translateX(-50%) scale(0.91);
    }

    #fab.open {
      background: linear-gradient(135deg, #ff453a 0%, #ff9f0a 100%);
      box-shadow: 0 4px 22px rgba(255, 69, 58, .45);
    }

    .fi {
      position: absolute;
      transition: opacity .2s, transform .28s var(--ease-spring);
    }

    .fi-o {
      opacity: 1;
      transform: rotate(0) scale(1);
    }

    .fi-c {
      opacity: 0;
      transform: rotate(-90deg) scale(.5);
    }

    #fab.open .fi-o {
      opacity: 0;
      transform: rotate(90deg) scale(.5);
    }

    #fab.open .fi-c {
      opacity: 1;
      transform: rotate(0) scale(1);
    }

    /* ── Sheet Overlay ─────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, .52);
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: opacity .3s;
    }

    #overlay.on {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Bottom Sheet ──────────────────────────────── */
    #sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 400;
      background: var(--surface-2);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      border-top: 1px solid var(--border-hi);
      max-height: 72vh;
      display: flex;
      flex-direction: column;
      transform: translateY(101%);
      transition: transform .38s var(--ease-spring);
      box-shadow: 0 -8px 40px rgba(0, 0, 0, .5);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #sheet.open {
      transform: translateY(0);
    }

    .sh-handle-row {
      padding: 10px 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sh-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-hi);
    }

    .sh-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 20px 10px;
      flex-shrink: 0;
    }

    .sh-ttl {
      font-size: 16px;
      font-weight: 700;
    }

    .sh-reset {
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      padding: 5px 9px;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s, background .15s;
    }

    .sh-reset:active {
      transform: scale(0.94);
      background: var(--accent-dim);
    }

    .sh-body {
      overflow-y: auto;
      padding: 4px 20px 20px;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    .sh-body::-webkit-scrollbar {
      display: none;
    }

    /* ── Search Box ────────────────────────────────── */
    .search-box {
      display: flex;
      align-items: center;
      gap: 9px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      margin-bottom: 20px;
      transition: border-color .15s, box-shadow .15s;
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 138, 255, .12);
    }

    .s-ico {
      font-size: 15px;
      color: var(--muted);
      flex-shrink: 0;
    }

    #s-input {
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text);
      background: transparent;
      width: 100%;
      font-family: inherit;
      caret-color: var(--accent);
    }

    #s-input::placeholder {
      color: var(--muted);
    }

    #s-clr {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 17px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }

    .search-box:focus-within #s-clr {
      opacity: 1;
    }

    /* ── Filter Groups & Chips ─────────────────────── */
    .fg {
      margin-bottom: 18px;
    }

    .fl {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 9px;
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 8px 15px;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: all .15s var(--ease-out), transform .1s;
    }

    .chip:active {
      transform: scale(0.95);
    }

    .chip.on {
      background: var(--accent-dim);
      border-color: rgba(79, 138, 255, .45);
      color: var(--accent);
      font-weight: 800;
      box-shadow: 0 0 0 1px rgba(79, 138, 255, .18);
    }

    .chip.yc.on {
      background: var(--year-dim);
      border-color: rgba(155, 116, 255, .45);
      color: var(--year);
      box-shadow: 0 0 0 1px rgba(155, 116, 255, .18);
    }

    .fg-div {
      height: 1px;
      background: var(--border);
      margin: 2px 0 18px;
    }

    /* ── Fade In ───────────────────────────────────── */
    @keyframes fi-anim {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .fade-in {
      animation: fi-anim .28s var(--ease-out) both;
    }

    /* ══════════════════════════════════════════════════
       ── REGISTER FORM (mode=register) ──────────────
       ══════════════════════════════════════════════════ */
    #reg-root {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      padding-top: env(safe-area-inset-top);
      position: relative;
      z-index: 1;
    }

    #reg-root.active {
      display: flex;
    }

    #root.reg-mode {
      display: none;
    }

    /* ── Reg Header ── */
    .reg-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      height: 56px;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .reg-back {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      padding: 6px 0;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .reg-header-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(130deg, #fff 0%, rgba(255, 255, 255, .65) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Form Body ── */
    .reg-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      padding-bottom: calc(100px + env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }

    .reg-body::-webkit-scrollbar {
      display: none;
    }

    /* ── Field ── */
    .reg-field {
      margin-bottom: 20px;
    }

    .reg-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .req-badge {
      font-size: 9px;
      font-weight: 900;
      color: var(--danger);
      background: rgba(255, 69, 58, .12);
      border-radius: 4px;
      padding: 1px 5px;
      letter-spacing: .3px;
    }

    .opt-badge {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      background: var(--surface-2);
      border-radius: 4px;
      padding: 1px 5px;
      letter-spacing: .3px;
    }

    /* ── Input base ── */
    .reg-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      caret-color: var(--accent);
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
      appearance: none;
    }

    .reg-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 138, 255, .12);
    }

    .reg-input::placeholder {
      color: var(--muted);
    }

    input[type="date"].reg-input::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
      cursor: pointer;
    }

    /* ── Combobox (select + free input) ── */
    .combo-wrap {
      position: relative;
    }

    .combo-select {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 14px 40px 14px 16px;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
      appearance: none;
    }

    .combo-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 138, 255, .12);
    }

    .combo-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }

    .combo-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
    }

    .combo-divider::before,
    .combo-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── URL Field with paste button ── */
    .url-wrap {
      display: flex;
      gap: 8px;
    }

    .url-wrap .reg-input {
      flex: 1;
      min-width: 0;
    }

    .paste-btn {
      flex-shrink: 0;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 0 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: all .15s, transform .1s;
    }

    .paste-btn:active {
      transform: scale(0.95);
      background: var(--accent-dim);
    }

    /* ── Preview Card ── */
    #reg-preview {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      margin-top: 24px;
    }

    #reg-preview.show {
      display: block;
    }

    .prev-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .prev-text {
      font-size: 14px;
      color: var(--sub);
      line-height: 2;
      white-space: pre-wrap;
      font-family: "SF Mono", "Menlo", monospace;
      word-break: break-all;
    }

    .prev-text strong {
      color: var(--text);
      font-weight: 700;
    }

    /* ── Submit Area ── */
    .reg-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 18px calc(16px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 50;
    }

    .submit-btn {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #4f8aff 0%, #7c5cfc 100%);
      border: none;
      border-radius: var(--r-md);
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .3px;
      box-shadow: 0 4px 20px rgba(79, 138, 255, .4);
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s var(--ease-spring), box-shadow .15s, opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    .submit-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .submit-btn.sending {
      opacity: .7;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(110px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 9999;
      background: var(--surface-2);
      border: 1px solid var(--border-hi);
      border-radius: var(--r-md);
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .3s var(--ease-spring);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.ok {
      border-color: rgba(48, 209, 88, .4);
      color: var(--success);
    }

    #toast.err {
      border-color: rgba(255, 69, 58, .4);
      color: var(--danger);
    }

    /* ── Reg Loading ── */
    .reg-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
    }

    .spin-ring {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .reg-loading-txt {
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════
     LIST MODE (既存、変更なし)
     ══════════════════════════════════════════ -->
  <div id="root">
    <header class="header">
      <div class="h-left">
        <span class="h-title">Matchbox</span>
        <span id="count-badge">…</span>
      </div>
      <div class="vtog">
        <button class="vtog-btn active" id="btn-list" aria-label="リスト表示">≡</button>

    <div id="sync-bar">

    <div id="af-bar"></div>

    <div id="loader">

  <div id="overlay"></div>

  <div id="sheet" role="dialog" aria-modal="true" aria-label="絞り込みフィルター">
    <div class="sh-handle-row">
      <div class="sh-handle"></div>
    </div>
    <div class="sh-head">
      <span class="sh-ttl">🔍 絞り込み</span>
      <button class="sh-reset" id="sh-reset">すべてリセット</button>
    </div>
    <div class="sh-body">
      <div class="search-box">
        <span class="s-ico">🔍</span>
        <input type="search" id="s-input" placeholder="対戦相手で検索…" autocomplete="off">
        <button id="s-clr" aria-label="検索をクリア">✕</button>

      <div class="fg">
        <div class="fl">期間（相対）</div>
        <div class="chips" id="per-chips"></div>
      </div>
      <div class="fg-div"></div>

        <div class="fl">年（絶対）</div>

  <!-- ══════════════════════════════════════════
     REGISTER MODE (新規追加)
     ══════════════════════════════════════════ -->
  <div id="reg-root">
    <header class="reg-header">
      <button class="reg-back" id="reg-back">‹ 戻る</button>
      <span class="reg-header-title">動画を登録</span>
    </header>

    <div class="reg-body" id="reg-body">
      <div class="reg-loading" id="reg-loader">

      </div>

      <div id="reg-form" style="display:none">

        <!-- 日時 -->
        <div class="reg-field">
          <div class="reg-label">

        <!-- カテゴリ -->
        <div class="reg-field">

          </div>
          <div class="combo-wrap">
            <select class="combo-select" id="f-cat-select">
              <option value="">— 選択してください —</option>
            </select>
            <span class="combo-arrow">▼</span>
          </div>
          <div class="combo-divider">または直接入力</div>
          <input type="text" class="reg-input" id="f-cat-text" placeholder="新しいカテゴリを入力…">

        <!-- 対戦相手 -->
        <div class="reg-field">
          <div class="reg-label">
            対戦相手 <span class="req-badge">必須</span>

          <div class="combo-wrap">
            <select class="combo-select" id="f-opp-select">
              <option value="">— 選択してください —</option>
            </select>
            <span class="combo-arrow">▼</span>
          </div>
          <div class="combo-divider">または直接入力</div>
          <input type="text" class="reg-input" id="f-opp-text" placeholder="新しい対戦相手を入力…">

        <!-- URL -->
        <div class="reg-field">

            URL <span class="req-badge">必須</span>

          <div class="url-wrap">
            <input type="url" class="reg-input" id="f-url" placeholder="https://youtube.com/…">
            <button class="paste-btn" id="paste-btn">貼付け</button>

        <!-- タイトル -->

        <!-- プレビュー -->

    <div class="reg-footer">

        <span id="submit-label">▶ 動画を登録する</span>
      </button>
    </div>

  <div id="toast"></div>

  <script>
    'use strict';
    /* ── Constants ─────────────────────────── */
    const LIFF_ID = '2009710355-DFflRjkN';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzkbUp2R21Rv6p9Ahd_5QSfxG8g9ODhXhO4HgGcIOzgxTpufhsM_HLDBPHdMV5NamLx/exec';
    const CACHE_KEY = 'mbx_cache_v3';
    const PERIODS = [
      { label: 'すべて', mo: 0 },
      { label: '直近1ヶ月', mo: 1 },
      { label: '3ヶ月', mo: 3 },
      { label: '6ヶ月', mo: 6 },
    ];
    const BADGE_CLS = ['b0', 'b1', 'b2', 'b3', 'b4'];

    /* ══ STATE LAYER — ES6 Proxy Reactive Store ═══════════════════ */
    const _subs = {};
    const subscribe = (k, fn) => { (_subs[k] = _subs[k] || []).push(fn); };
    const notify = (k, v, p) => {
      (_subs[k] || []).forEach(f => f(v, p));
      (_subs['*'] || []).forEach(f => f(k, v, p));
    };

    const state = new Proxy({
      allData: [],
      query: '',
      category: 'すべて',
      period: 'すべて',
      year: 'すべて',
      viewMode: 'list',
      sheet: false,
      loading: true,
      syncing: false,
      error: null,
    }, {
      set(t, k, v) {
        const p = t[k];
        if (p === v) return true;
        t[k] = v; notify(k, v, p); return true;
      }
    });

    /* ── Actions ────────────────────────────── */
    const A = {
      setData(d) { state.allData = d; },
      setLoading(v) { state.loading = v; },
      setSyncing(v) { state.syncing = v; },
      setError(m) { state.error = m; },
      setView(m) { state.viewMode = m; },
      toggleSheet() { state.sheet = !state.sheet; },
      closeSheet() { state.sheet = false; },
      setQuery(q) { state.query = q; },
      setCat(c) { state.category = c; },
      setPeriod(p) { state.period = p; if (p !== 'すべて') state.year = 'すべて'; },
      setYear(y) { state.year = y; if (y !== 'すべて') state.period = 'すべて'; },
      clearAll() {
        state.category = 'すべて'; state.period = 'すべて';
        state.year = 'すべて'; state.query = '';
        document.getElementById('s-input').value = '';
      },
    };

    /* ══ DATA LAYER — Offline-First (Stale-While-Revalidate) ══════ */
    const Cache = {
      read() { try { const r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } },
      write(d) { try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: d })); } catch { } },
    };
    const sortDesc = arr => [...arr].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    const isDiff = (a, b) => JSON.stringify(a) !== JSON.stringify(b);

    async function fetchGAS(token) {
      const r = await fetch(`${GAS_URL}?action=getVideos&idToken=${encodeURIComponent(token)}`);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'API Error');
      return sortDesc(j.data);
    }

    /* ══ SELECTORS ════════════════════════════════════════════════ */
    function getFiltered() {
      const { allData, query, category, period, year } = state;
      const kw = query.toLowerCase();
      const thr = getPeriodThr(period);
      return allData.filter(x => {
        if (category !== 'すべて' && x.category !== category) return false;
        if (thr) { const d = new Date((x.date || '').replace(/\//g, '-')); if (isNaN(d) || d < thr) return false; }
        if (year !== 'すべて' && !(x.date || '').startsWith(year)) return false;
        if (kw && !(x.opponent || '').toLowerCase().includes(kw)) return false;
        return true;
      });
    }
    function getPeriodThr(label) {
      const p = PERIODS.find(x => x.label === label);
      if (!p || p.mo === 0) return null;
      const n = new Date();
      return new Date(n.getFullYear(), n.getMonth() - p.mo, n.getDate());
    }
    function getCats() { return ['すべて', ...new Set(state.allData.map(d => d.category).filter(Boolean))]; }
    function getYears() {
      const yrs = [...new Set(state.allData.map(d => (d.date || '').slice(0, 4)).filter(Boolean))].sort((a, b) => b.localeCompare(a));
      return ['すべて', ...yrs];
    }
    function getActiveFils() {
      const f = [];
      if (state.category !== 'すべて') f.push({ label: state.category, cls: '', clear: () => A.setCat('すべて') });
      if (state.period !== 'すべて') f.push({ label: state.period, cls: '', clear: () => A.setPeriod('すべて') });
      if (state.year !== 'すべて') f.push({ label: state.year + '年', cls: 'y', clear: () => A.setYear('すべて') });
      if (state.query) f.push({ label: '「' + state.query + '」', cls: 's', clear: () => { A.setQuery(''); document.getElementById('s-input').value = ''; } });
      return f;
    }

    /* ══ UTILITIES ════════════════════════════════════════════════ */
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function hl(txt, kw) {
      const e = esc(txt);
      if (!kw) return e;
      return e.replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`);
    }
    function fmtMonth(d) {
      const p = (d || '').replace(/-/g, '/').split('/');
      return p.length >= 2 ? `${p[0]}年${parseInt(p[1], 10)}月` : '不明';
    }
    function badgeCls(cat) {
      const cats = getCats().filter(c => c !== 'すべて');
      return BADGE_CLS[cats.indexOf(cat) % BADGE_CLS.length] || 'b0';
    }

    /* ══ SKELETON PROXY — IntersectionObserver Lazy DOM ══════════ */
    let _io = null;
    function initIO() {
      if (_io) _io.disconnect();
      _io = new IntersectionObserver(entries => {
        for (const e of entries) {
          if (e.isIntersecting) hydrateShell(e.target);
          else pruneShell(e.target);
        }
      }, { rootMargin: '200% 0px', threshold: 0 });
    }
    function hydrateShell(el) {
      if (!el.dataset.inner || el.dataset.h === '1') return;
      el.innerHTML = el.dataset.inner;
      el.dataset.h = '1';
      el.style.height = '';
    }
    function pruneShell(el) {
      if (el.dataset.h !== '1') return;
      const h = el.getBoundingClientRect().height;
      if (h > 0) el.style.height = h + 'px';
      el.innerHTML = '';
      el.dataset.h = '0';
    }
    function observeShell(el) { _io && _io.observe(el); }

    /* ══ VIEW LAYER — Pure rendering functions ═══════════════════ */
    const V = {
      renderLoader() {
        const ld = document.getElementById('loader');
        const ca = document.getElementById('content-area');
        ld.style.display = state.loading && state.allData.length === 0 ? '' : 'none';
        ca.style.display = !state.loading || state.allData.length > 0 ? '' : 'none';
      },
      renderErr() {
        const b = document.getElementById('err-box');
        document.getElementById('err-msg').textContent = state.error || '';
        b.classList.toggle('on', !!state.error);
      },
      renderSync() {
        const dot = document.getElementById('sdot');
        const txt = document.getElementById('stxt');
        if (state.syncing) { dot.className = 'sdot spin'; txt.textContent = 'バックグラウンドで更新中…'; }
        else { dot.className = 'sdot'; txt.textContent = state.error && state.allData.length === 0 ? 'エラー' : 'データ表示中'; }
      },
      renderSheet() {
        document.getElementById('sheet').classList.toggle('open', state.sheet);
        document.getElementById('overlay').classList.toggle('on', state.sheet);
        const fab = document.getElementById('fab');
        fab.classList.toggle('open', state.sheet);
        fab.setAttribute('aria-label', state.sheet ? '絞り込みを閉じる' : '絞り込みを開く');
      },
      renderViewToggle() {
        document.getElementById('btn-list').classList.toggle('active', state.viewMode === 'list');
        document.getElementById('btn-tile').classList.toggle('active', state.viewMode === 'tile');
        document.getElementById('list-wrap').style.display = state.viewMode === 'list' ? '' : 'none';
        document.getElementById('tile-wrap').style.display = state.viewMode === 'tile' ? 'grid' : 'none';
      },
      renderChips() {
        const cc = document.getElementById('cat-chips');
        cc.innerHTML = '';
        getCats().forEach(c => {
          const b = document.createElement('button');
          b.className = 'chip' + (c === state.category ? ' on' : '');
          b.textContent = c; b.onclick = () => A.setCat(c);
          cc.appendChild(b);
        });
        const pc = document.getElementById('per-chips');
        pc.innerHTML = '';
        PERIODS.forEach(p => {
          const b = document.createElement('button');
          b.className = 'chip' + (p.label === state.period ? ' on' : '');
          b.textContent = p.label; b.onclick = () => A.setPeriod(p.label);
          pc.appendChild(b);
        });
        const yc = document.getElementById('yr-chips');
        yc.innerHTML = '';
        getYears().forEach(y => {
          const b = document.createElement('button');
          b.className = 'chip yc' + (y === state.year ? ' on' : '');
          b.textContent = y === 'すべて' ? 'すべての年' : y + '年';
          b.onclick = () => A.setYear(y);
          yc.appendChild(b);
        });
      },
      renderAfBar() {
        const bar = document.getElementById('af-bar');
        bar.innerHTML = '';
        const fils = getActiveFils();
        fils.forEach(f => {
          const el = document.createElement('button');
          el.className = `af-chip ${f.cls}`;
          el.innerHTML = `${esc(f.label)} <span>✕</span>`;
          el.onclick = f.clear;
          bar.appendChild(el);
        });
        if (fils.length > 1) {
          const cl = document.createElement('button');
          cl.id = 'af-clearall'; cl.textContent = 'すべてクリア';
          cl.onclick = () => A.clearAll();
          bar.appendChild(cl);
        }
      },
      renderCount(n, total) {
        document.getElementById('count-badge').textContent = state.loading ? '…' : `${n}/${total}件`;
      },
      renderContent() {
        const filtered = getFiltered();
        this.renderCount(filtered.length, state.allData.length);
        this.renderAfBar();
        if (state.viewMode === 'list') this._renderList(filtered);
        else this._renderTile(filtered);
      },
      _mkSep(month, tileMode) {
        const el = document.createElement('div');
        el.className = 'm-sep' + (tileMode ? ' m-sep-tile' : '');
        el.innerHTML = `<span class="m-sep-t">${esc(month)}</span><div class="m-sep-l"></div>`;
        return el;
      },
      _renderList(items) {
        const wrap = document.getElementById('list-wrap');
        wrap.innerHTML = '';
        if (!items.length) {
          wrap.innerHTML = '<div class="empty fade-in"><div class="empty-icon">🔍</div><div class="empty-txt">該当する試合動画が見つかりません<br>絞り込み条件を変えてみてください</div></div>';
          return;
        }
        initIO();
        let lastM = null;
        items.forEach(item => {
          const m = fmtMonth(item.date);
          if (m !== lastM) { wrap.appendChild(this._mkSep(m, false)); lastM = m; }
          const shell = document.createElement('a');
          shell.className = 'card-shell';
          shell.href = item.url || '#';
          shell.target = '_blank'; shell.rel = 'noopener noreferrer';
          shell.dataset.h = '0';
          const bc = badgeCls(item.category);
          shell.dataset.inner = `<div class="card">
        <div class="card-top">
          <span class="c-date">${esc(item.date)}</span>
          <span class="badge ${bc}">${esc(item.category || '未分類')}</span>
        </div>
        <div class="c-title">${esc(item.title || '(タイトルなし)')}</div>
        <div class="c-opp"><span class="vs-tag">VS</span>${hl(item.opponent || '', state.query)}</div>
      </div>`;
          wrap.appendChild(shell);
          observeShell(shell);
        });
      },
      _renderTile(items) {
        const wrap = document.getElementById('tile-wrap');
        wrap.innerHTML = '';
        if (!items.length) {
          wrap.innerHTML = '<div class="empty fade-in" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-txt">該当する試合動画が見つかりません<br>絞り込み条件を変えてみてください</div></div>';
          return;
        }
        initIO();
        let lastM = null;
        items.forEach(item => {
          const m = fmtMonth(item.date);
          if (m !== lastM) { wrap.appendChild(this._mkSep(m, true)); lastM = m; }
          const shell = document.createElement('a');
          shell.className = 'tile-shell';
          shell.href = item.url || '#';
          shell.target = '_blank'; shell.rel = 'noopener noreferrer';
          shell.dataset.h = '0';
          const bc = badgeCls(item.category);
          shell.dataset.inner = `<div class="tile">
        <span class="badge ${bc}">${esc(item.category || '未分類')}</span>
        <div class="tile-opp">${hl(item.opponent || '', state.query)}</div>
        <div class="tile-date">${esc(item.date)}</div>
      </div>`;
          wrap.appendChild(shell);
          observeShell(shell);
        });
      },
      full() {
        this.renderLoader();
        this.renderErr();
        this.renderSync();
        this.renderSheet();
        this.renderViewToggle();
        this.renderChips();
        this.renderContent();
      },
    };

    /* ══ SUBSCRIPTIONS — wire state → view ═══════════════════════ */
    subscribe('loading', () => { V.renderLoader(); V.renderCount(getFiltered().length, state.allData.length); });
    subscribe('syncing', () => V.renderSync());
    subscribe('error', () => { V.renderErr(); V.renderSync(); });
    subscribe('sheet', () => V.renderSheet());
    subscribe('viewMode', () => { V.renderViewToggle(); V.renderContent(); });
    ['allData', 'query', 'category', 'period', 'year'].forEach(k =>
      subscribe(k, () => { V.renderChips(); V.renderContent(); })
    );

    /* ══ EVENT BINDINGS (list mode) ══════════════════════════════ */
    function bind() {
      document.getElementById('fab').onclick = () => A.toggleSheet();
      document.getElementById('overlay').onclick = () => A.closeSheet();
      document.getElementById('sh-reset').onclick = () => A.clearAll();
      document.getElementById('btn-list').onclick = () => A.setView('list');
      document.getElementById('btn-tile').onclick = () => A.setView('tile');
      document.getElementById('s-clr').onclick = () => { document.getElementById('s-input').value = ''; A.setQuery(''); };
      let st;
      document.getElementById('s-input').addEventListener('input', e => {
        clearTimeout(st); st = setTimeout(() => A.setQuery(e.target.value.trim()), 200);
      });
    }

    /* ══════════════════════════════════════════════════════════════
       REGISTER MODE
       ══════════════════════════════════════════════════════════════ */

    /* ── Toast helper ── */
    function showToast(msg, type = '', ms = 2800) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + type;
      clearTimeout(t._tid);
      t._tid = setTimeout(() => { t.className = ''; }, ms);
    }

    /* ── Build preview text (= LINEに送信されるテキスト) ── */
    function buildMessage(fields) {
      const { date, category, opponent, url, title } = fields;
      const lines = [date, category, opponent, url];
      if (title) lines.push(title);
      return lines.join('\n');
    }

    /* ── フォームの値を収集 ── */
    function collectFields() {
      const date = document.getElementById('f-date').value;       // yyyy-MM-dd
      const catSel = document.getElementById('f-cat-select').value;
      const catTxt = document.getElementById('f-cat-text').value.trim();
      const oppSel = document.getElementById('f-opp-select').value;
      const oppTxt = document.getElementById('f-opp-text').value.trim();
      const url = document.getElementById('f-url').value.trim();
      const title = document.getElementById('f-title').value.trim();

      // selectの選択が「選択してください」以外ならそちら優先、それ以外はテキスト
      const category = catSel || catTxt;
      const opponent = oppSel || oppTxt;

      // 日付をyyyy/MM/dd形式に変換
      const dateFmt = date ? date.replace(/-/g, '/') : '';

      return { date: dateFmt, category, opponent, url, title };
    }

    /* ── バリデーション ── */
    function validate(fields) {
      if (!fields.date) return '日時を選択してください';
      if (!fields.category) return 'カテゴリを選択または入力してください';
      if (!fields.opponent) return '対戦相手を選択または入力してください';
      if (!fields.url) return 'URLを入力してください';
      try { new URL(fields.url); } catch { return 'URLの形式が正しくありません'; }
      return null;
    }

    /* ── プレビュー更新 ── */
    function updatePreview() {
      const fields = collectFields();
      const preview = document.getElementById('reg-preview');
      const prevTxt = document.getElementById('prev-text');
      const btn = document.getElementById('submit-btn');

      const err = validate(fields);
      if (err) {
        preview.classList.remove('show');
        btn.disabled = true;
        return;
      }

      const msg = buildMessage(fields);
      // 各行をハイライト表示
      const lines = msg.split('\n');
      const labels = ['日時', 'カテゴリ', '対戦相手', 'URL', 'タイトル'];
      prevTxt.innerHTML = lines.map((l, i) =>
        `<strong>${labels[i] || ''}：</strong>${esc(l)}`
      ).join('\n');

      preview.classList.add('show');
      btn.disabled = false;
    }

    /* ── セレクト/インプットの排他制御 ── */
    function setupComboExclusion(selectId, textId) {
      const sel = document.getElementById(selectId);
      const txt = document.getElementById(textId);
      sel.addEventListener('change', () => {
        if (sel.value) { txt.value = ''; txt.style.opacity = '0.4'; txt.disabled = true; }
        else { txt.style.opacity = ''; txt.disabled = false; }
        updatePreview();
      });
      txt.addEventListener('input', () => {
        if (txt.value) { sel.value = ''; sel.style.opacity = '0.4'; }
        else { sel.style.opacity = ''; }
        updatePreview();
      });
      txt.addEventListener('focus', () => {
        sel.value = ''; sel.style.opacity = '0.4';
      });
      txt.addEventListener('blur', () => {
        if (!txt.value) sel.style.opacity = '';
      });
    }

    /* ── マスタデータ取得してセレクトを構築 ── */
    async function loadMasterData(token) {
      const r = await fetch(`${GAS_URL}?action=getMasterData&idToken=${encodeURIComponent(token)}`);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'getMasterData Error');
      return j.data; // { categories: [], opponents: [] }
    }

    function buildSelect(selectId, items) {
      const sel = document.getElementById(selectId);
      items.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item; opt.textContent = item;
        sel.appendChild(opt);
      });
    }

    /* ── 送信 ── */
    async function submitForm(token) {
      const fields = collectFields();
      const err = validate(fields);
      if (err) { showToast('⚠ ' + err, 'err'); return; }

      const msg = buildMessage(fields);

      const btn = document.getElementById('submit-btn');
      const label = document.getElementById('submit-label');
      btn.disabled = true; btn.classList.add('sending');
      label.textContent = '送信中…';

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'registerVideo',
            idToken: token,
            fields: fields,
          }),
        });
        showToast('✓ 登録メッセージを送信しました', 'ok');
        // フォームリセット
        setTimeout(() => {
          document.getElementById('f-date').value = '';
          document.getElementById('f-cat-select').value = '';
          document.getElementById('f-cat-text').value = '';
          document.getElementById('f-opp-select').value = '';
          document.getElementById('f-opp-text').value = '';
          document.getElementById('f-url').value = '';
          document.getElementById('f-title').value = '';
          // セレクトのopacity戻す
          ['f-cat-select', 'f-opp-select'].forEach(id => document.getElementById(id).style.opacity = '');
          ['f-cat-text', 'f-opp-text'].forEach(id => {
            const el = document.getElementById(id);
            el.style.opacity = ''; el.disabled = false;
          });
          document.getElementById('reg-preview').classList.remove('show');
          btn.disabled = true;
        }, 600);
      } catch (e) {
        showToast('⚠ 送信に失敗しました: ' + e.message, 'err', 4000);
      } finally {
        btn.classList.remove('sending');
        label.textContent = '▶ 動画を登録する';
        // disabled は updatePreview() が制御するので再評価
        updatePreview();
      }
    }

    /* ── Register mode の初期化 ── */
    async function initRegisterMode(token) {
      document.getElementById('root').classList.add('reg-mode');
      document.getElementById('reg-root').classList.add('active');

      // フィルターボタンを非表示
      document.getElementById('fab').style.display = 'none';

      // 戻るボタン
      document.getElementById('reg-back').onclick = () => {
        // mode=register を外してリスト画面へ
        const url = new URL(location.href);
        url.searchParams.delete('mode');
        location.replace(url.toString());
      };

      // 今日の日付をデフォルト設定
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('f-date').value = `${yyyy}-${mm}-${dd}`;

      // URLペーストボタン
      document.getElementById('paste-btn').onclick = async () => {
        try {
          const txt = await navigator.clipboard.readText();
          document.getElementById('f-url').value = txt;
          updatePreview();
        } catch {
          showToast('クリップボードへのアクセスを許可してください', 'err');
        }
      };

      // 各フィールドの入力でプレビュー更新
      ['f-date', 'f-url', 'f-title'].forEach(id => {
        document.getElementById(id).addEventListener('input', updatePreview);
        document.getElementById(id).addEventListener('change', updatePreview);
      });

      // 送信ボタン
      document.getElementById('submit-btn').onclick = submitForm(token);

      // マスタデータ取得
      try {
        const master = await loadMasterData(token);
        buildSelect('f-cat-select', master.categories);
        buildSelect('f-opp-select', master.opponents);
      } catch (e) {
        // マスタ取得失敗してもフォームは使える（直接入力で対応）
        showToast('候補データの取得に失敗しました', 'err');
      }

      // セレクト↔テキストの排他制御
      setupComboExclusion('f-cat-select', 'f-cat-text');
      setupComboExclusion('f-opp-select', 'f-opp-text');

      // ローディング非表示、フォーム表示
      document.getElementById('reg-loader').style.display = 'none';
      document.getElementById('reg-form').style.display = '';

      // 初期プレビュー評価
      updatePreview();
    }

    /* ══ BOOTSTRAP ═══════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', async () => {

      // ── modeを判定 ──
      const mode = new URLSearchParams(location.search).get('mode');

      // ── LIFF init（共通）──
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: location.href });
          return;
        }
      } catch (err) {
        if (mode === 'register') {
          document.getElementById('reg-loader').innerHTML =
            `<div class="reg-loading-txt" style="color:var(--danger)">LIFF初期化失敗: ${esc(err.message)}</div>`;
        } else {
          A.setLoading(false);
          A.setError('LIFF初期化失敗: ' + err.message);
        }
        return;
      }

      const token = liff.getIDToken();
      if (!token) {
        if (mode !== 'register') { A.setLoading(false); A.setError('IDトークン取得失敗'); }
        return;
      }

      // ── 登録モード ──
      if (mode === 'register') {
        await initRegisterMode(token);
        return;
      }

      // ── 一覧モード（既存の処理そのまま）──
      bind();

      const cached = Cache.read();
      if (cached?.data?.length) {
        A.setData(sortDesc(cached.data));
        A.setLoading(false);
        V.renderChips();
      }

      A.setSyncing(true);
      try {
        const fresh = await fetchGAS(token);
        if (isDiff(fresh, state.allData)) {
          A.setData(fresh);
          Cache.write(fresh);
        }
        A.setLoading(false);
        A.setError(null);
      } catch (err) {
        if (!state.allData.length) { A.setLoading(false); A.setError('通信エラー: ' + err.message); }
      } finally {
        A.setSyncing(false);
      }
    });
  </script>
</body>
